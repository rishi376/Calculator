<div class="inputDiv">
    <form (ngSubmit)='calculate(calc)' #calc=ngForm>
        <div class="inputForm">
            <input type="number" name="operand1" ngModel>
            <select name="operator" id="operator" ngModel>
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="/">/</option>
                <option value="*">*</option>
            </select>
            <input type="number" name="operand2" ngModel>
        </div>
        <div class="btn-Submit">
            <button type="submit">calculate</button>
        </div>
        
    </form>
</div>

<div class="result">
  {{result}}
</div>
